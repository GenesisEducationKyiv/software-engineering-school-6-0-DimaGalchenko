services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "50051:50051"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/release_notifier
      BASE_URL: http://localhost:3000
      GITHUB_TOKEN: ""
      SCAN_CRON: "*/1 * * * *"
      REDIS_URL: redis://redis:6379
      API_KEY: ""
      NOTIFICATION_TRANSPORT: grpc
      NOTIFICATION_GRPC_URL: notification:50052
      NOTIFICATION_HTTP_URL: http://notification:3001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification:
        condition: service_started
    restart: unless-stopped

  notification:
    build: ./notification-service
    ports:
      - "3001:3001"
      - "50052:50052"
    environment:
      PORT: 3001
      GRPC_PORT: 50052
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BASE_URL: http://localhost:3000
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: release_notifier
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
